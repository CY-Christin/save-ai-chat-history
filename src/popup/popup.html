<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <style>
      :root { color-scheme: light dark; }
      body {
        font: 13px/1.6 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        width: 320px;
        margin: 0;
        padding: 14px 16px;
      }
      h1 { font-size: 14px; margin: 0 0 10px; }
      .row { margin: 6px 0; color: #888; }
      .warn { color: #f59e0b; }
      button {
        margin-top: 6px;
        padding: 7px 16px;
        border: 0;
        border-radius: 7px;
        background: #5b51e8;
        color: #fff;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover { background: #4b41d8; }
      button:disabled { opacity: 0.5; cursor: default; }
      #result { min-height: 1em; }
      .links { margin-top: 10px; border-top: 1px solid #8884; padding-top: 8px; }
      a { color: #5b51e8; text-decoration: none; font-size: 12px; }
      #convUrl {
        display: inline-block;
        max-width: 190px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        vertical-align: bottom;
      }
    </style>
  </head>
  <body>
    <h1>Save AI Chat History</h1>
    <div id="sinks" class="row">…</div>
    <div id="conv" class="row"></div>
    <div id="convLink" class="row" hidden>
      直链：<a id="convUrl" target="_blank"></a> <a href="#" id="convCopy">复制</a>
    </div>
    <button id="resync" hidden>重新同步此对话</button>
    <button id="export" hidden>导出</button>
    <div id="result" class="row"></div>
    <div class="links"><a href="#" id="openOptions">打开设置</a></div>
    <script src="popup.js"></script>
  </body>
</html>
