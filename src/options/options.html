<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Chat → Notion Sync · 设置</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        font: 14px/1.6 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        max-width: 640px;
        margin: 40px auto;
        padding: 0 20px;
      }
      h1 { font-size: 20px; margin-bottom: 4px; }
      .sub { color: #888; margin-top: 0; }
      .sink {
        border: 1px solid #8884;
        border-radius: 10px;
        padding: 16px 18px;
        margin: 16px 0;
      }
      .sink-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .sink-head h2 { font-size: 16px; margin: 0; }
      .fields { margin-top: 12px; }
      .field { margin: 10px 0; }
      .field label { display: block; font-weight: 600; margin-bottom: 3px; }
      .field input {
        width: 100%;
        box-sizing: border-box;
        padding: 7px 9px;
        border: 1px solid #8886;
        border-radius: 6px;
        background: #fff1;
        font: inherit;
      }
      .field .help { color: #888; font-size: 12px; margin-top: 3px; }
      .switch { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #888; }
      .actions { margin-top: 24px; display: flex; align-items: center; gap: 14px; }
      button {
        padding: 8px 18px;
        border: 0;
        border-radius: 7px;
        background: #5b51e8;
        color: #fff;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover { background: #4b41d8; }
      #status { color: #10b981; font-size: 13px; }
      .disabled .fields { opacity: 0.45; pointer-events: none; }
    </style>
  </head>
  <body>
    <h1>落地渠道设置</h1>
    <p class="sub">每个渠道独立开关与配置；开启哪个就同步到哪个。</p>
    <div id="sinks"></div>
    <div class="actions">
      <button id="save">保存</button>
      <span id="status"></span>
    </div>
    <script src="options.js"></script>
  </body>
</html>
